# Configuracion de base de datos para tests (H2 en memoria)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Valores ficticios para Mail para evitar errores de auto-configuracion
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# Valores ficticios para Seguridad y JWT
app.security.admin-password=admin_test_pass
app.security.jwt.secret=secret_key_de_prueba_lo_suficientemente_larga_para_jwt
app.security.jwt.access-expiration=3600000
app.security.jwt.refresh-expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
